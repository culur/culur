name: 🛠️ Build and release

on: [push, pull_request]

jobs:
  #! ----- ----- ----- Build and test ----- ----- ----- !#
  build:
    name: Build and test
    runs-on: ubuntu-latest
    env:
      NX_REJECT_UNKNOWN_LOCAL_CACHE: 0
    steps:
      #! Checkout
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          # This makes Actions fetch all Git history for validate commit
          fetch-depth: 0

      #! Install dependencies
      - name: 📥 Install dependencies
        uses: ./.github/actions/install-dependencies

      #! Build
      - name: 🛠️ Build
        run: yarn build

      #! Lint
      - name: 🧹 Lint
        run: yarn lint

      #! Test
      - name: 🐛 Test
        run: yarn test

      - name: 💬 Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: yarn commitlint --from origin/main --to HEAD --verbose

      - name: 💬 Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: yarn commitlint --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} --to ${{ github.event.pull_request.head.sha }} --verbose

      #! Find coverage files
      - name: 🔎 Find coverage files
        id: coverage-files
        run: echo "files=$(find . -path ./.nx -prune , -type f -name coverage-final.json | paste -sd,)" >> $GITHUB_OUTPUT

      #! Upload Coverage
      - name: ⬆️ Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ${{ steps.coverage-files.outputs.files }}
          disable_search: true

  #! ----- ----- ----- Prepare release ----- ----- ----- !#
  release:
    name: Prepare release pull request
    needs: build
    if: "${{ github.ref == 'refs/heads/release' || (github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'chore: version packages')) }}"
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    env:
      NX_REJECT_UNKNOWN_LOCAL_CACHE: 0
    steps:
      #! Checkout
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0

      #! Install dependencies
      - name: ⬇️ Install dependencies
        uses: ./.github/actions/install-dependencies

      #! Build
      - name: 🛠️ Build
        run: yarn build

      #! Create release pull request or publish to npm
      - name: 🚀 Create release pull request or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
          branch: main
          version: yarn changeset:version
          publish: yarn changeset:publish
        env:
          # Only release on main branch
          NPM_TOKEN: ${{ github.ref == 'refs/heads/main' && secrets.NPM_TOKEN || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
